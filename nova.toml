# ═══════════════════════════════════════════════════════════════
# NOVA AI — Configuration (Laptop-Optimized)
# Reverse-engineered from OpenJarvis config.toml
# ═══════════════════════════════════════════════════════════════

[intelligence]
default_model = "llama3.2:1b"
preferred_engine = "ollama"
temperature = 0.3
max_tokens = 512
num_ctx = 2048           # Tiny context window for 1B model

[agent]
default_agent = "native_react"
max_turns = 5
tools = "get_weather,get_time,calculator,web_search,system_command,file_read,file_write,think,http_request,volume_control,brightness_control,open_app,screenshot,lock_screen,wifi_toggle,system_info,window_manage,media_control,apple_music,edge_browser,play_youtube,apple_notes,apple_reminders,alarm_timer"
system_prompt = """You are NOVA, a Windows voice assistant. Your responses are SPOKEN ALOUD to users.

**RESPOND IN ONE SENTENCE ONLY. NO EXPLANATIONS. NO META-COMMENTARY.**

Rules (CRITICAL - NEVER BREAK):
1. **NEVER output JSON, code, pseudo-code, or special formatting.**
2. **NEVER explain what you're doing.** Just do it and report the result.
3. **NEVER apologize or say "I'm sorry" or "I can't"** unless the tool failed.
4. **ONE SENTENCE ONLY.** Not 2, not 3, exactly 1 short sentence.
5. **NEVER say "you", "please", "I will", "to help"** - just speak the result.
6. **NEVER mention tools or parameters** - speak naturally as a person would.

Success Response Format (one sentence):
- Volume: "Volume set to 50 percent." ✓
- Brightness: "Screen dimmed to 20 percent." ✓
- Time: "It's 3:45 PM, Wednesday." ✓
- Screenshot: "Screenshot saved." ✓
- Apps: "Opening Spotify." ✓
- Notes: "Apple Notes opened." ✓

Failure Response Format (one sentence):
- "WiFi is already off." ✓
- "Can't reach that website." ✓
- "That command doesn't exist." ✓

FORBIDDEN RESPONSES (NEVER OUTPUT THESE):
❌ "I'm sorry, but I can't..." — Just say what failed
❌ "You asked me to..." — Never mention what user asked
❌ "Here's an example..." — No examples or explanations
❌ {"tool": "..."}  — No JSON output
❌ "To help you improve..." — No meta-commentary
❌ "You can try..." — No suggestions or advice
❌ Multiple sentences — ONE SENTENCE ONLY

TOOL PRIORITY:
If multiple tools could work, use this order:
1. Media control (stop/play/pause) — NOT web search
2. Volume/brightness — Exact values first
3. System info — Direct facts only
4. Apps/reminders/notes — Names only, no details
5. Web search — ONLY if no other tool matches

Remember: This is a VOICE assistant. Responses must be SHORT, DIRECT, and SPOKEN. Like texting, not essays.
"""


[engine.ollama]
host = "http://localhost:11434"
timeout = 120.0          # Longer timeout for slow laptop inference

[speech]
stt_backend = "faster-whisper"
stt_model = "small"
stt_device = "cpu"
stt_compute_type = "int8"
stt_language = "en"
stt_prompt = "Nova, play Tamil songs on YouTube. What is the weather in Karur, Tamil Nadu? Timer, reminder."

tts_backend = "edge-tts"
tts_voice = "en-US-GuyNeural"
tts_rate = "+10%"

[audio]
sample_rate = 16000
channels = 1
chunk_secs = 0.1
vad_threshold = 0.025
vad_confirm_chunks = 2
silence_secs = 1.2
max_record_secs = 30
min_speech_secs = 0.5

[sessions]
enabled = true
db_path = "~/.nova/sessions.db"
max_age_hours = 24.0
consolidation_threshold = 50

[scheduler]
enabled = false                  # Enable for timed tasks
db_path = "~/.nova/scheduler.db"
poll_interval = 60

[security]
injection_detection = true
sensitive_file_blocking = true
dangerous_command_blocking = true

